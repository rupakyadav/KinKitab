<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>KinKitab</title>
    <meta
      name="description"
      content="KinKitab is a marketplace for used books. Buy and sell pre-loved reads in your city, with cash on delivery."
    />
    <!--
      Apply the saved theme BEFORE React mounts so dark-mode users don't
      see a flash of light styles on every page load.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('kinkitab-theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {
          /* localStorage may be blocked; fall back to light */
        }
      })();
    </script>
  </head>
  <body class="bg-stone-50 text-stone-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
